name: Enviar Relatorio ImagineBooks

on:
  schedule:
    # A cada 3 dias as 11:00 UTC (= 8:00 BRT)
    - cron: '0 11 */3 * *'
  workflow_dispatch: # Permite executar manualmente pelo GitHub

jobs:
  enviar-relatorio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Enviar relatorio por email
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          WC_CONSUMER_KEY: ${{ secrets.WC_CONSUMER_KEY }}
          WC_CONSUMER_SECRET: ${{ secrets.WC_CONSUMER_SECRET }}
          WC_STORE_URL: 'https://www.imaginebooks.com.br'
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python enviar_relatorio.py 3
